# ContactSheet — Container Station compose for QNAP NAS
#
# DEPLOYMENT
# ----------
# 1. Place the project source tree at the resolved physical path on the NAS:
#       /share/CACHEDEV5_DATA/ProgramData-vol5/Containers/contactsheet/
#    (NOT /share/ProgramData-vol5/... — that's a symlink, and Container Station
#    rejects symlinked paths for bind mounts.)
#
# 2. In that same directory, create a `.env` file with:
#       FLICKR_API_KEY=...
#       FLICKR_API_SECRET=...
#       ORIGIN=http://192.168.0.199:3418     (LAN testing)
#       # or ORIGIN=https://contactsheet.jjlnas.com  (Cloudflare tunnel later)
#    Values are loaded into the container via `env_file:` below — Container
#    Station does NOT auto-parse `.env` for `${VAR}` substitution in the YAML.
#
# 3. Container Station → Applications → Create → paste this YAML → Apply.
#    First run builds the image from source on the NAS; subsequent runs are
#    instant.
#
# Mirrors Darkroom Log's container layout (host port + NAS-volume path).
# 3416 is darkroom, 3417 is piwigo — bump the host port if 3418 ever clashes.

services:
  contactsheet:
    # Image is built outside Container Station via SSH:
    #   ssh -p 1056 jtalakua@192.168.0.199
    #   /share/CACHEDEV5_DATA/.qpkg/container-station/bin/docker build \
    #     -t contactsheet:local /share/CACHEDEV5_DATA/ProgramData-vol5/Containers/contactsheet
    # (Container Station rejects compose `build:` blocks during app validation.)
    image: contactsheet:local
    # Never reach for a registry — `contactsheet:local` is built on the NAS
    # itself and lives only in the local Docker image cache. Without this,
    # Container Station's "Create application" flow tries to docker pull the
    # tag from Docker Hub and fails with "pull access denied".
    pull_policy: never
    container_name: contactsheet
    restart: unless-stopped

    ports:
      # Host:container. NAS 3416 is darkroom, 3417 is piwigo — using 3418.
      - '3418:3000'

    # `env_file` actually injects the values into the container — Container
    # Station does not auto-parse .env for `${VAR}` substitution in the compose
    # itself, which is why the previous version blew up with a 500 at /auth/start.
    # The .env on the NAS must contain:
    #   FLICKR_API_KEY=...
    #   FLICKR_API_SECRET=...
    #   ORIGIN=http://192.168.0.199:3418     (LAN testing)
    #   # or ORIGIN=https://contactsheet.jjlnas.com  (Cloudflare tunnel later)
    env_file:
      # Absolute path required: Container Station validates YAML from /tmp,
      # so a relative `.env` resolves to /tmp/.env and fails.
      - /share/CACHEDEV5_DATA/ProgramData-vol5/Containers/contactsheet/.env

    # `environment:` overrides `env_file` for matching keys. The password is
    # easy to rotate from Container Station's YAML editor — change the value
    # below, click Apply / Recreate. Other secrets stay in .env (set once).
    environment:
      APP_PASSWORD: change-me-in-container-station

    volumes:
      # Persists the OAuth token (data/auth.json) across image rebuilds.
      - /share/CACHEDEV5_DATA/ProgramData-vol5/Containers/contactsheet/data:/app/data

    networks:
      # Same bridge cloudflared lives on, matching Darkroom Log's pattern.
      # The Cloudflare tunnel ingress can then route to http://contactsheet:3000
      # by container DNS instead of going through the host LAN IP + 3418.
      - scoobydoo

networks:
  scoobydoo:
    external: true
