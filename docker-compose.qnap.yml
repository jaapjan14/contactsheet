# ContactSheet — Container Station compose for QNAP NAS
#
# DEPLOYMENT
# ----------
# 1. Place the project source tree on the NAS at:
#       /share/ProgramData-vol5/Containers/contactsheet/
#    (Dockerfile, src/, package.json, etc. — everything the build needs.)
#
# 2. In that same directory, create a `.env` file with:
#       FLICKR_API_KEY=...
#       FLICKR_API_SECRET=...
#    (Container Station picks it up automatically because it sits next to this
#    compose file.)
#
# 3. Container Station → Applications → Create → paste this YAML → Apply.
#    First run builds the image from source on the NAS; subsequent runs are
#    instant.
#
# Mirrors Darkroom Log's container layout (host port + NAS-volume path).
# Adjust the host port (CONTACTSHEET_PORT below) if 3417 is taken on the NAS.

services:
  contactsheet:
    build:
      context: /share/ProgramData-vol5/Containers/contactsheet
      dockerfile: Dockerfile
    image: contactsheet:local
    container_name: contactsheet
    restart: unless-stopped

    ports:
      # Host:container — change the host side if 3417 is in use on the NAS.
      - '3417:3000'

    environment:
      FLICKR_API_KEY: ${FLICKR_API_KEY}
      FLICKR_API_SECRET: ${FLICKR_API_SECRET}
      # ORIGIN must match the URL the app is reached at. SvelteKit uses it for
      # form-action and OAuth-callback origin checks. Pick whichever applies:
      #   - LAN only:        http://192.168.0.199:3417
      #   - Cloudflare tunnel: https://contactsheet.jjlnas.com
      ORIGIN: ${CONTACTSHEET_ORIGIN:-http://192.168.0.199:3417}

    volumes:
      # Persists the OAuth token (data/auth.json) across image rebuilds.
      - /share/ProgramData-vol5/Containers/contactsheet/data:/app/data
